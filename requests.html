<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>需求广场 - 玩转AI进化网</title>
  <meta name="description" content="网友提交的AI进化需求，经审核后展示。">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://aigo.homes/requests.html">
  <link rel="stylesheet" href="css/style.css">
  <link rel="alternate" hreflang="zh" href="https://aigo.homes/requests.html">
  <link rel="alternate" hreflang="en" href="https://aigo.homes/en/requests.html">
  <link rel="alternate" hreflang="x-default" href="https://aigo.homes/requests.html">
  <style>
    .req-status {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .status-pending { background: #f59e0b22; color: #f59e0b; }
    .status-approved { background: #22c55e22; color: #22c55e; }
    .status-done { background: #0ea5e922; color: #0ea5e9; }
    .status-rejected { background: #ef444422; color: #ef4444; }
    .req-labels { margin-top: 0.5rem; }
    .req-label {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 0.25rem;
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.75rem;
      margin-right: 0.4rem;
    }
    .req-date { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem; }
    .loading { text-align: center; padding: 3rem; color: var(--text-muted); }
    .error { text-align: center; padding: 3rem; color: #ef4444; }
    .empty { text-align: center; padding: 3rem; color: var(--text-muted); }
    .github-link { margin-top: 0.75rem; font-size: 0.85rem; }
  </style>
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main">
    <div class="nav-inner">
      <a href="index.html" class="logo" data-i18n="siteName">玩转AI进化网</a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" data-i18n="nav.home">首页</a>
        <a href="tweets.html" data-i18n="nav.tweets">推文</a>
        <a href="submit.html" data-i18n="nav.submit">提交需求</a>
        <a href="requests.html" class="active" data-i18n="nav.requests">需求广场</a>
        <a href="games.html" data-i18n="nav.games">游戏</a>
        <a href="faq.html" data-i18n="nav.faq">常见问题</a>
      </div>
      <button id="lang-switch" data-i18n="langSwitch">English</button>
    </div>
  </nav>

  <section class="features" aria-label="Community Requests">
    <h2 class="section-title" data-i18n="requests.title">网友需求广场</h2>
    <p class="section-subtitle">用户提交的需求，经AI审核后展示。你也可以<a href="submit.html">提交新需求</a>。</p>

    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">全部</button>
      <button class="filter-tab" data-filter="pending-review">审核中</button>
      <button class="filter-tab" data-filter="approved">已通过</button>
      <button class="filter-tab" data-filter="done">已完成</button>
    </div>

    <div id="requests-list">
      <div class="loading">正在从需求池加载数据...</div>
    </div>
  </section>

  <div class="ad-slot" aria-label="Advertisement">广告位预留 - Google AdSense</div>

  <footer class="footer" role="contentinfo">
    <p data-i18n="footer.slogan">AI进化网站，你进化想法。</p>
    <p data-i18n="footer.contact">联系邮箱：</p>
    <p><a href="privacy.html">隐私政策</a> · <a href="about.html">关于我们</a> · <a href="faq.html">常见问题</a></p>
    <p style="font-size:0.8rem; margin-top:1rem; color:var(--text-muted);" data-i18n="disclaimer">本网站仅供演示和参考，不构成医疗、法律或财务建议。</p>
  </footer>

  <script src="js/i18n-data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/mobile-nav.js"></script>
  <script>
    const GITHUB_API = 'https://api.github.com/repos/Omlandc/aievoweb/issues';

    function getStatusInfo(labels) {
      const labelNames = labels.map(l => l.name);
      if (labelNames.includes('done')) return { text: '已完成', class: 'status-done', filter: 'done' };
      if (labelNames.includes('approved')) return { text: '已通过', class: 'status-approved', filter: 'approved' };
      if (labelNames.includes('pending-review')) return { text: '审核中', class: 'status-pending', filter: 'pending-review' };
      return { text: '待审核', class: 'status-pending', filter: 'pending-review' };
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function renderRequest(issue) {
      const status = getStatusInfo(issue.labels);
      const body = issue.body || '';
      // 提取需求描述（第一行或前200字）
      const desc = body.split('\n')[0] || body.slice(0, 200);
      const labels = issue.labels.filter(l => l.name !== 'user-request');

      return `
        <div class="card" data-status="${status.filter}">
          <div class="card-header">
            <span class="card-title">${issue.title}</span>
            <span class="req-status ${status.class}">${status.text}</span>
          </div>
          <div class="card-body">${desc}</div>
          <div class="req-labels">
            ${labels.map(l => `<span class="req-label">${l.name}</span>`).join('')}
          </div>
          <div class="req-date">#${issue.number} · ${formatDate(issue.created_at)} · 提交者: ${issue.user.login}</div>
          <div class="github-link"><a href="${issue.html_url}" target="_blank" rel="noopener">查看讨论与进度 →</a></div>
        </div>
      `;
    }

    async function loadRequests() {
      const container = document.getElementById('requests-list');

      try {
        // 获取带 user-request 标签的 Issues
        const response = await fetch(`${GITHUB_API}?labels=user-request&state=all&sort=created&direction=desc&per_page=50`);

        if (!response.ok) {
          throw new Error('GitHub API 请求失败: ' + response.status);
        }

        const issues = await response.json();

        if (issues.length === 0) {
          container.innerHTML = '<div class="empty">暂无需求，<a href="submit.html">成为第一个提交者</a>！</div>';
          return;
        }

        container.innerHTML = issues.map(renderRequest).join('');

        // 绑定筛选
        document.querySelectorAll('.filter-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const filter = tab.getAttribute('data-filter');
            document.querySelectorAll('#requests-list .card').forEach(card => {
              card.style.display = (filter === 'all' || card.getAttribute('data-status') === filter) ? 'block' : 'none';
            });
          });
        });

      } catch (err) {
        console.error('加载失败:', err);
        container.innerHTML = `<div class="error">
          <p>加载失败，请稍后刷新重试</p>
          <p style="font-size:0.85rem; margin-top:0.5rem;">${err.message}</p>
          <p style="margin-top:1rem;"><a href="${GITHUB_API}?labels=user-request&state=all" target="_blank">直接查看 GitHub Issues</a></p>
        </div>`;
      }
    }

    loadRequests();
  </script>
</body>
</html>
