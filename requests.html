
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <link rel="alternate" hreflang="zh" href="https://aigo.homes/requests.html">
  <link rel="alternate" hreflang="en" href="https://aigo.homes/en/requests.html">
  <link rel="alternate" hreflang="x-default" href="https://aigo.homes/requests.html">
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main">
    <div class="nav-inner">
      <a href="index.html" class="logo" data-i18n="siteName">玩转AI进化网</a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" data-i18n="nav.home">首页</a>
        <a href="tweets.html" data-i18n="nav.tweets">推文</a>
        <a href="explore.html" data-i18n="nav.explore">探索</a>
        <a href="submit.html" data-i18n="nav.submit">提交需求</a>
        <a href="requests.html" class="active" data-i18n="nav.requests">需求广场</a>
        <a href="faq.html" data-i18n="nav.faq">常见问题</a>
      </div>
      <button id="lang-switch" data-i18n="langSwitch">English</button>
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="菜单">☰</button>
    </div>
  </nav>

  <section class="features" aria-label="Community Requests">
    <h2 class="section-title" data-i18n="requests.title">网友需求广场</h2>
    <p class="section-subtitle" data-i18n="requests.subtitle">用户提交的各类需求，经AI自动审核后展示。</p>

    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">全部</button>
      <button class="filter-tab" data-filter="pending">审核中</button>
      <button class="filter-tab" data-filter="approved">已通过</button>
      <button class="filter-tab" data-filter="done">已完成</button>
    </div>

    <div id="requests-list">
      <div class="loading" style="text-align:center; color:var(--text-muted); padding:2rem;">正在加载需求...</div>
    </div>
  </section>

  <div class="ad-slot" aria-label="Advertisement">广告位预留 - Google AdSense</div>

  <footer class="footer" role="contentinfo">
    <p data-i18n="footer.slogan">AI进化网站，你进化想法。</p>
    <p><a href="privacy.html">隐私政策</a> · <a href="about.html">关于我们</a> · <a href="faq.html">常见问题</a></p>
    <p style="font-size:0.8rem; margin-top:1rem; color:var(--text-muted);" data-i18n="disclaimer">本网站仅供演示和参考，不构成医疗、法律或财务建议。</p>
  </footer>

  <script src="js/i18n-data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/mobile-nav.js"></script>
  <script>
    async function loadRequests() {
      const container = document.getElementById('requests-list');
      if (!container) return;

      try {
        const response = await fetch('https://api.github.com/repos/Omlandc/aievoweb/issues?labels=user-request&state=all&sort=created&direction=desc&per_page=50');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const issues = await response.json();

        if (issues.length === 0) {
          container.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:2rem;">暂无需求，<a href="submit.html">提交第一个</a>？</div>';
          return;
        }

        function getStatus(issue) {
          const labels = (issue.labels || []).map(l => l.name);
          if (labels.includes('done')) return { text: '✅ 已完成', color: '#0ea5e9' };
          if (labels.includes('approved')) return { text: '✅ 已通过', color: '#22c55e' };
          return { text: '⏳ 审核中', color: '#f59e0b' };
        }

        function formatDate(dateStr) {
          if (!dateStr) return '';
          const d = new Date(dateStr);
          return d.toLocaleDateString('zh-CN');
        }

        const html = issues.map(issue => {
          const status = getStatus(issue);
          const labels = (issue.labels || []).filter(l => l.name !== 'user-request').map(l => '<span style="display:inline-block; padding:0.15rem 0.5rem; border-radius:9999px; font-size:0.75rem; background:' + (l.color ? '#' + l.color : '#f1f5f9') + '; color:#475569; margin-right:0.25rem;">' + l.name + '</span>').join('');
          const date = formatDate(issue.created_at);

          return '<div class="card" data-status="' + (issue.labels || []).map(l => l.name).join(' ') + '">' +
            '<div class="card-header">' +
            '<span class="card-title">' + (issue.title || '无标题') + '</span>' +
            '<span class="card-meta" style="color:' + status.color + ';">' + status.text + '</span>' +
            '</div>' +
            '<div class="card-body">' + (issue.body || '').replace(/\n/g, ' ').slice(0, 300) + ((issue.body || '').length > 300 ? '...' : '') + '</div>' +
            '<div style="padding:0.75rem 1.25rem; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">' +
            '<div>' + labels + '</div>' +
            '<span style="font-size:0.75rem; color:var(--text-muted);">' + date + '</span>' +
            '</div>' +
            '</div>';
        }).join('');

        container.innerHTML = html;

        document.querySelectorAll('.filter-tab').forEach(tab => {
          tab.addEventListener('click', () => {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const filter = tab.getAttribute('data-filter');
            document.querySelectorAll('#requests-list .card').forEach(card => {
              const status = card.getAttribute('data-status');
              const show = filter === 'all' ||
                (filter === 'pending' && status.includes('pending-review')) ||
                (filter === 'approved' && status.includes('approved')) ||
                (filter === 'done' && status.includes('done'));
              card.style.display = show ? 'block' : 'none';
            });
          });
        });
      } catch (err) {
        console.error('需求加载失败:', err);
        container.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding:2rem;">加载失败，请刷新重试。</div>';
      }
    }

    loadRequests();
  </script>
</body>
</html>
