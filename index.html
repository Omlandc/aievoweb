    // 生成配色占位图
    function generateThumb(title, id) {
      const colors = ['#e0e7ff','#dbeafe','#dcfce7','#fef3c7','#ffe4e6','#f3e8ff','#ccfbf1','#fecaca'];
      let hash = 0;
      const str = id || title || 'x';
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      const color = colors[Math.abs(hash) % colors.length];
      const letter = (title || '?').charAt(0).toUpperCase();
      return `<div class="timeline-thumb" style="background:${color}; font-weight:700; font-size:1.5rem; color:var(--text-muted);">${letter}</div>`;
    }

    // 提取时分
    function extractTime(isoString) {
      if (!isoString) return '';
      try {
        const d = new Date(isoString);
        const h = String(d.getHours()).padStart(2, '0');
        const m = String(d.getMinutes()).padStart(2, '0');
        return `${h}:${m}`;
      } catch (e) {
        return '';
      }
    }

    async function loadHomeTweets() {
      const container = document.getElementById('home-tweets-list');
      if (!container) return;
      const currentLang = localStorage.getItem('lang') || 'zh';
      function getDisplayLang(tweet) {
        if (currentLang === 'zh' && tweet.zh) return 'zh';
        if (currentLang === 'en' && tweet.en) return 'en';
        if (tweet.zh) return 'zh';
        if (tweet.en) return 'en';
        return 'zh';
      }
      function renderHomeTweet(tweet, index) {
        const time = extractTime(tweet.created);
        const date = tweet.date || '';
        const source = tweet.source || '';
        let title, content;
        if (tweet.zh && tweet.zh.title) {
          const lang = getDisplayLang(tweet);
          const data = tweet[lang] || tweet.zh;
          title = data.title || '无标题';
          content = data.content || '';
        } else {
          title = tweet.title || '无标题';
          content = tweet.content || '';
        }
        const summary = content.slice(0, 200);
        const more = content.length > 200 ? '...' : '';
        return `
          <div class="timeline-item">
            ${generateThumb(title, tweet.id || String(index))}
            <div class="timeline-main">
              <div class="timeline-title"><a href="tweets.html">${title}</a></div>
              <div class="timeline-summary">${summary}${more}</div>
              <div class="timeline-source">${time} · ${source || 'AI生成'} ${tweet.category || ''}</div>
            </div>
          </div>
        `;
      }
      try {
        let tweets = [];
        try {
          const idxRes = await fetch('data/index.json?t=' + Date.now());
          const idx = await idxRes.json();
          const months = (idx.months || []).filter(m => m.month !== 'tweets');
          if (months.length > 0) {
            const latest = months[0].month;
            const res = await fetch(`data/${latest}.json?t=${Date.now()}`);
            const data = await res.json();
            tweets = data.tweets || data || [];
          }
        } catch (e) {
          // index.json 不存在或解析失败，使用 tweets.json
        }
        
        // 如果上面没加载到数据，直接加载 tweets.json
        if (tweets.length === 0) {
          const res = await fetch('data/tweets.json?t=' + Date.now());
          const data = await res.json();
          tweets = data.tweets || data || [];
        }
        if (tweets.length === 0) {
          container.innerHTML = '<div class="loading">暂无推文，RSS Bot 每天 21:00 自动更新。</div>';
          return;
        }
        const latest = tweets.slice(0, 6);
        container.innerHTML = latest.map((t, i) => renderHomeTweet(t, i)).join('');
      } catch (err) {
        console.error('首页推文加载失败:', err);
        container.innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
      }
    }

    loadHomeTweets();
  </script>
