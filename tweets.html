
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最新推文 - 玩转AI进化网</title>
  <meta name="description" content="AI自动筛选的科技、产品、设计短内容，中英双语支持。">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://aigo.homes/tweets.html">
  <link rel="stylesheet" href="css/style.css">
  <link rel="alternate" hreflang="zh" href="https://aigo.homes/tweets.html">
  <link rel="alternate" hreflang="en" href="https://aigo.homes/en/tweets.html">
  <link rel="alternate" hreflang="x-default" href="https://aigo.homes/tweets.html">
  <style>
    .load-more { text-align: center; padding: 2rem; }
    .load-more button { 
      background: var(--accent-2); color: #fff; border: none; 
      padding: 0.75rem 1.5rem; border-radius: 0.5rem; 
      cursor: pointer; font-size: 1rem; 
    }
    .load-more button:hover { background: var(--accent-1); }
    .load-more button:disabled { opacity: 0.5; cursor: not-allowed; }
    .month-label { 
      text-align: center; color: var(--accent-2); 
      font-size: 0.9rem; margin: 2rem 0 1rem; 
      border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; 
    }
    .loading { text-align: center; padding: 2rem; color: var(--text-muted); }
    .empty { text-align: center; padding: 3rem; color: var(--text-muted); }
    .lang-badge { 
      display: inline-block; padding: 0.2rem 0.5rem; 
      border-radius: 0.25rem; background: var(--accent-2); 
      color: #fff; font-size: 0.75rem; margin-left: 0.5rem; 
      cursor: pointer;
    }
  </style>
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main">
    <div class="nav-inner">
      <a href="index.html" class="logo" data-i18n="siteName">玩转AI进化网</a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" data-i18n="nav.home">首页</a>
        <a href="tweets.html" class="active" data-i18n="nav.tweets">推文</a>
        <a href="explore.html" data-i18n="nav.explore">探索</a>
        <a href="submit.html" data-i18n="nav.submit">提交需求</a>
        <a href="requests.html" data-i18n="nav.requests">需求广场</a>
        <a href="faq.html" data-i18n="nav.faq">常见问题</a>
      </div>
      <button id="lang-switch" data-i18n="langSwitch">English</button>
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="菜单">☰</button>
    </div>
  </nav>

  <section class="features" aria-label="Tweets">
    <h2 class="section-title" data-i18n="tweets.title">最新推文</h2>
    <p class="section-subtitle">AI 自动生成的短内容更新。按时间排序。</p>

    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">全部</button>
      <button class="filter-tab" data-filter="short">短内容</button>
      <button class="filter-tab" data-filter="long">长内容</button>
      <button class="filter-tab" data-filter="zh">中文</button>
      <button class="filter-tab" data-filter="en">English</button>
    </div>

    <div id="tweets-list">
      <div class="loading">正在加载推文...</div>
    </div>

    <div class="load-more">
      <button id="load-more">加载更多</button>
    </div>
  </section>

  <div class="ad-slot" aria-label="Advertisement">广告位预留 - Google AdSense</div>

  <footer class="footer" role="contentinfo">
    <p data-i18n="footer.slogan">AI进化网站，你进化想法。</p>
    <p><a href="privacy.html">隐私政策</a> · <a href="about.html">关于我们</a> · <a href="faq.html">常见问题</a></p>
    <p style="font-size:0.8rem; margin-top:1rem; color:var(--text-muted);" data-i18n="disclaimer">本网站仅供演示和参考，不构成医疗、法律或财务建议。</p>
  </footer>

  <script src="js/i18n-data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/mobile-nav.js"></script>
  <script>
    let allTweets = [];
    let currentPage = 0;
    const PAGE_SIZE = 10;
    let monthsLoaded = [];
    let currentMonthIndex = 0;
    let currentFilter = 'all';

    function getDisplayLang(tweet) {
      const currentLang = localStorage.getItem('siteLang') || 'zh';
      if (currentLang === 'zh' && tweet.zh) return 'zh';
      if (currentLang === 'en' && tweet.en) return 'en';
      if (tweet.zh) return 'zh';
      if (tweet.en) return 'en';
      return 'zh';
    }

    function renderTweet(tweet) {
      const lang = getDisplayLang(tweet);
      const content = tweet[lang];
      const date = tweet.date || (tweet.created && tweet.created.split('T')[0]) || '';
      const source = tweet.source ? ' · ' + tweet.source : '';
      const type = tweet.type || 'short';
      const hasEn = tweet.en ? '<span class="lang-badge" data-lang="en">EN</span>' : '';
      const hasZh = tweet.zh ? '<span class="lang-badge" data-lang="zh">中</span>' : '';
      const toggleBtn = (hasEn && hasZh) ? '<span class="lang-toggle" onclick="toggleTweetLang(this, \'' + (tweet.id || '') + '\')">切换语言</span>' : '';

      return '<div class="card" data-type="' + type + '" data-lang="' + lang + '" data-id="' + (tweet.id || '') + '">' +
        '<div class="card-header">' +
        '<span class="card-title">' + (content?.title || '无标题') + '</span>' +
        '<span class="card-meta">' + date + source + '</span>' +
        '</div>' +
        '<div class="card-body">' + (content?.content || '') + '</div>' +
        '<div style="padding:0.75rem 1.25rem; border-top:1px solid var(--border); display:flex; gap:0.5rem; align-items:center;">' +
        (hasZh + hasEn) + toggleBtn +
        '</div>' +
        '</div>';
    }

    function toggleTweetLang(btn, tweetId) {
      const card = btn.closest('.card');
      const currentLang = card.getAttribute('data-lang');
      const tweet = allTweets.find(t => t.id === tweetId || t.id == tweetId);
      if (!tweet) return;
      const newLang = currentLang === 'zh' ? 'en' : 'zh';
      const content = tweet[newLang];
      if (!content) return;
      card.setAttribute('data-lang', newLang);
      const titleEl = card.querySelector('.card-title');
      const bodyEl = card.querySelector('.card-body');
      if (titleEl) titleEl.textContent = content.title || '无标题';
      if (bodyEl) bodyEl.textContent = content.content || '';
    }

    function applyFilter() {
      const cards = document.querySelectorAll('#tweets-list .card');
      cards.forEach(card => {
        const type = card.getAttribute('data-type');
        const lang = card.getAttribute('data-lang');
        let show = true;
        if (currentFilter === 'short') show = type === 'short';
        else if (currentFilter === 'long') show = type === 'long';
        else if (currentFilter === 'zh') show = lang === 'zh';
        else if (currentFilter === 'en') show = lang === 'en';
        card.style.display = show ? 'block' : 'none';
      });
    }

    async function loadTweets() {
      const container = document.getElementById('tweets-list');
      const loadMoreBtn = document.getElementById('load-more');
      if (!container) return;

      try {
        const idxRes = await fetch('data/index.json?t=' + Date.now());
        const idx = await idxRes.json();
        monthsLoaded = (idx.months || []).filter(m => m.month !== 'tweets');

        if (monthsLoaded.length === 0) {
          const res = await fetch('data/tweets.json?t=' + Date.now());
          const data = await res.json();
          allTweets = data.tweets || data || [];
          if (allTweets.length === 0) {
            container.innerHTML = '<div class="empty">暂无推文，RSS Bot 每天 21:00 自动更新。</div>';
            if (loadMoreBtn) loadMoreBtn.style.display = 'none';
            return;
          }
          renderPage();
          return;
        }

        await loadMonth(0);
      } catch (err) {
        console.error('推文加载失败:', err);
        container.innerHTML = '<div class="empty">加载失败，请刷新重试。</div>';
        if (loadMoreBtn) loadMoreBtn.style.display = 'none';
      }
    }

    async function loadMonth(monthIndex) {
      if (monthIndex >= monthsLoaded.length) {
        const loadMoreBtn = document.getElementById('load-more');
        if (loadMoreBtn) loadMoreBtn.style.display = 'none';
        return;
      }
      const month = monthsLoaded[monthIndex].month;
      try {
        const res = await fetch('data/' + month + '.json?t=' + Date.now());
        const data = await res.json();
        const tweets = data.tweets || data || [];
        allTweets = allTweets.concat(tweets);
        currentMonthIndex = monthIndex;
        renderPage();
      } catch (err) {
        console.error('加载月份失败:', month, err);
      }
    }

    function renderPage() {
      const container = document.getElementById('tweets-list');
      const loadMoreBtn = document.getElementById('load-more');
      const start = currentPage * PAGE_SIZE;
      const end = start + PAGE_SIZE;
      const pageTweets = allTweets.slice(start, end);

      if (currentPage === 0) {
        container.innerHTML = pageTweets.map(renderTweet).join('') || '<div class="empty">暂无推文。</div>';
      } else {
        container.innerHTML += pageTweets.map(renderTweet).join('');
      }

      applyFilter();

      if (end >= allTweets.length && currentMonthIndex < monthsLoaded.length - 1) {
        if (loadMoreBtn) loadMoreBtn.textContent = '加载更早月份';
      } else if (end >= allTweets.length) {
        if (loadMoreBtn) loadMoreBtn.style.display = 'none';
      }
    }

    document.getElementById('load-more').addEventListener('click', async () => {
      currentPage++;
      const start = currentPage * PAGE_SIZE;
      if (start >= allTweets.length && currentMonthIndex < monthsLoaded.length - 1) {
        await loadMonth(currentMonthIndex + 1);
        currentPage = 0;
      } else {
        renderPage();
      }
    });

    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.getAttribute('data-filter');
        applyFilter();
      });
    });

    loadTweets();
  </script>
</body>
</html>
