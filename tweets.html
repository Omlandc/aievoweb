<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最新推文 - 玩转AI进化网</title>
  <meta name="description" content="AI自动筛选的科技、产品、设计短内容，中英双语支持。">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://aigo.homes/tweets.html">
  <link rel="stylesheet" href="css/style.css">
  <link rel="alternate" hreflang="zh" href="https://aigo.homes/tweets.html">
  <link rel="alternate" hreflang="en" href="https://aigo.homes/en/tweets.html">
  <link rel="alternate" hreflang="x-default" href="https://aigo.homes/tweets.html">
  <style>
    .load-more { text-align: center; padding: 2rem; }
    .load-more button { 
      background: var(--accent-2); color: #fff; border: none; 
      padding: 0.75rem 1.5rem; border-radius: 0.5rem; 
      cursor: pointer; font-size: 1rem; 
    }
    .load-more button:hover { background: var(--accent-1); }
    .load-more button:disabled { opacity: 0.5; cursor: not-allowed; }
    .month-label { 
      text-align: center; color: var(--accent-2); 
      font-size: 0.9rem; margin: 2rem 0 1rem; 
      border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; 
    }
    .loading { text-align: center; padding: 2rem; color: var(--text-muted); }
    .empty { text-align: center; padding: 3rem; color: var(--text-muted); }
    .lang-badge { 
      display: inline-block; padding: 0.2rem 0.5rem; 
      border-radius: 0.25rem; background: var(--accent-2); 
      color: #fff; font-size: 0.75rem; margin-left: 0.5rem; 
      cursor: pointer;
    }
  </style>
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Main">
    <div class="nav-inner">
      <a href="index.html" class="logo" data-i18n="siteName">玩转AI进化网</a>
      <div class="nav-links" id="nav-links">
        <a href="index.html" data-i18n="nav.home">首页</a>
        <a href="tweets.html" class="active" data-i18n="nav.tweets">推文</a>
        <a href="games.html" data-i18n="nav.games">游戏</a>
        <a href="nav.html" data-i18n="nav.nav">导航</a>
        <a href="submit.html" data-i18n="nav.submit">提交需求</a>
        <a href="requests.html" data-i18n="nav.requests">需求广场</a>
        <a href="explore.html" data-i18n="nav.explore">探索</a>
        <a href="faq.html" data-i18n="nav.faq">常见问题</a>
      </div>
      <button id="lang-switch" data-i18n="langSwitch">English</button>
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="菜单">☰</button>
    </div>
  </nav>

  <section class="features" aria-label="Tweets">
    <h2 class="section-title" data-i18n="tweets.title">最新推文</h2>
    <p class="section-subtitle">AI 每日从 RSS 源筛选、总结、推送的科技短内容。中英双语。</p>

    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">全部</button>
      <button class="filter-tab" data-filter="short">短内容</button>
      <button class="filter-tab" data-filter="long">长内容</button>
      <button class="filter-tab" data-filter="zh">中文</button>
      <button class="filter-tab" data-filter="en">English</button>
    </div>

    <div id="tweets-list">
      <div class="loading">正在加载推文...</div>
    </div>

    <div class="load-more" id="load-more-container">
      <button id="load-more-btn" onclick="loadMore()">加载更多</button>
    </div>
  </section>

  <div class="ad-slot" aria-label="Advertisement">广告位预留 - Google AdSense</div>

  <footer class="footer" role="contentinfo">
    <p data-i18n="footer.slogan">AI进化网站，你进化想法。</p>
    <p data-i18n="footer.contact">联系邮箱：</p>
    <p><a href="privacy.html">隐私政策</a> · <a href="about.html">关于我们</a> · <a href="faq.html">常见问题</a></p>
    <p style="font-size:0.8rem; margin-top:1rem; color:var(--text-muted);" data-i18n="disclaimer">本网站仅供演示和参考，不构成医疗、法律或财务建议。</p>
  </footer>

  <script src="js/i18n-data.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/mobile-nav.js"></script>
  <script>
    // 全局状态
    let currentLang = localStorage.getItem('lang') || 'zh';
    let allTweets = [];
    let displayedCount = 0;
    const PAGE_SIZE = 10;
    let currentFilter = 'all';
    let monthIndex = 0;
    let availableMonths = [];

    function getDisplayLang(tweet) {
      if (currentLang === 'zh' && tweet.zh) return 'zh';
      if (currentLang === 'en' && tweet.en) return 'en';
      if (tweet.zh) return 'zh';
      if (tweet.en) return 'en';
      return 'zh';
    }

    function renderTweet(tweet) {
      // 兼容旧格式（单语言）和新格式（双语）
      let content, isZh, hasTranslation;
      
      if (tweet.zh && tweet.zh.title) {
        // 新格式：双语
        const lang = getDisplayLang(tweet);
        content = tweet[lang] || tweet.zh;
        isZh = lang === 'zh';
        hasTranslation = !!(tweet.zh && tweet.en);
      } else {
        // 旧格式：单语言
        content = { title: tweet.title || '无标题', content: tweet.content || '' };
        isZh = tweet.lang !== 'en';
        hasTranslation = false;
      }
      
      const otherLang = isZh ? 'en' : 'zh';
      
      const date = tweet.date || (tweet.created && tweet.created.split('T')[0]) || '';
      const source = tweet.source ? ` · ${tweet.source}` : '';
      const tag = tweet.category || '';
      const type = tweet.type || 'short';
      
      let translationBtn = '';
      if (hasTranslation) {
        const otherLangLabel = isZh ? 'EN' : '中';
        translationBtn = `<span class="lang-badge" onclick="toggleTweetLang('${tweet.id}', event)">${otherLangLabel}</span>`;
      }
      
      return `
        <div class="card" data-type="${type}" data-id="${tweet.id}" data-lang="${isZh ? 'zh' : 'en'}">
          <div class="card-header">
            <span class="card-title">${content?.title || '无标题'}${translationBtn}</span>
            <span class="card-meta">${date}${source}</span>
          </div>
          <div class="card-body">${content?.content || ''}</div>
          ${tweet.link ? `<div class="card-body" style="margin-top:0.5rem;"><a href="${tweet.link}" target="_blank" rel="noopener">查看原文 →</a></div>` : ''}
          ${tag ? `<div class="card-body" style="margin-top:0.5rem;"><span style="color:var(--accent-2); font-size:0.85rem;">${tag}</span></div>` : ''}
        </div>
      `;
    }

    function toggleTweetLang(tweetId, event) {
      event.preventDefault();
      event.stopPropagation();
      
      const card = document.querySelector(`[data-id="${tweetId}"]`);
      if (!card) return;
      
      const tweet = allTweets.find(t => t.id === tweetId);
      if (!tweet) return;
      
      const currentCardLang = card.getAttribute('data-lang');
      const newLang = currentCardLang === 'zh' ? 'en' : 'zh';
      
      if (!tweet[newLang]) return;
      
      const content = tweet[newLang];
      const isZh = newLang === 'zh';
      const otherLangLabel = isZh ? 'EN' : '中';
      
      card.setAttribute('data-lang', newLang);
      card.innerHTML = `
        <div class="card-header">
          <span class="card-title">${content?.title || '无标题'}<span class="lang-badge" onclick="toggleTweetLang('${tweetId}', event)">${otherLangLabel}</span></span>
          <span class="card-meta">${tweet.date || ''} · ${tweet.source || ''}</span>
        </div>
        <div class="card-body">${content?.content || ''}</div>
        ${tweet.link ? `<div class="card-body" style="margin-top:0.5rem;"><a href="${tweet.link}" target="_blank" rel="noopener">查看原文 →</a></div>` : ''}
        ${content?.category ? `<div class="card-body" style="margin-top:0.5rem;"><span style="color:var(--accent-2); font-size:0.85rem;">${content.category}</span></div>` : ''}
      `;
    }

    async function loadMore() {
      const btn = document.getElementById('load-more-btn');
      btn.disabled = true;
      btn.textContent = '加载中...';
      
      let tweetsToShow = [];
      
      if (displayedCount < allTweets.length) {
        tweetsToShow = allTweets.slice(displayedCount, displayedCount + PAGE_SIZE);
      } else if (monthIndex < availableMonths.length - 1) {
        monthIndex++;
        const monthFile = availableMonths[monthIndex].month;
        try {
          const response = await fetch(`data/${monthFile}.json?t=${Date.now()}`);
          const data = await response.json();
          const monthTweets = data.tweets || data;
          allTweets = allTweets.concat(monthTweets);
          tweetsToShow = monthTweets.slice(0, PAGE_SIZE);
          
          const container = document.getElementById('tweets-list');
          const monthLabel = document.createElement('div');
          monthLabel.className = 'month-label';
          monthLabel.textContent = `${monthFile} 归档`;
          container.appendChild(monthLabel);
        } catch (e) {
          console.error('加载月份失败:', e);
        }
      }
      
      if (tweetsToShow.length > 0) {
        const container = document.getElementById('tweets-list');
        const html = tweetsToShow.map(renderTweet).join('');
        container.insertAdjacentHTML('beforeend', html);
        displayedCount += tweetsToShow.length;
      }
      
      const hasMore = displayedCount < allTweets.length || monthIndex < availableMonths.length - 1;
      btn.disabled = false;
      btn.textContent = hasMore ? '加载更多' : '已加载全部';
      if (!hasMore) btn.disabled = true;
      
      applyFilter(currentFilter);
    }

    function applyFilter(filter) {
      const cards = document.querySelectorAll('#tweets-list .card');
      cards.forEach(card => {
        const type = card.getAttribute('data-type');
        const lang = card.getAttribute('data-lang');
        
        let visible = false;
        if (filter === 'all') {
          visible = true;
        } else if (filter === 'short' || filter === 'long') {
          visible = type === filter;
        } else if (filter === 'zh' || filter === 'en') {
          visible = lang === filter;
        }
        
        card.style.display = visible ? 'block' : 'none';
      });
    }

    async function init() {
      try {
        const indexResponse = await fetch('data/index.json?t=' + Date.now());
        const index = await indexResponse.json();
        availableMonths = (index.months || []).filter(m => m.month !== 'tweets');
        
        if (availableMonths.length === 0) {
          // 回退：直接加载 tweets.json
          const response = await fetch('data/tweets.json?t=' + Date.now());
          const data = await response.json();
          allTweets = data.tweets || data || [];
        } else {
          const latestMonth = availableMonths[0].month;
          const response = await fetch(`data/${latestMonth}.json?t=${Date.now()}`);
          const data = await response.json();
          allTweets = data.tweets || data || [];
        }
        
        const container = document.getElementById('tweets-list');
        
        if (allTweets.length === 0) {
          container.innerHTML = '<div class="empty">暂无推文，RSS Bot 会在每天 21:00 自动更新。</div>';
          document.getElementById('load-more-btn').style.display = 'none';
          return;
        }
        
        const initialTweets = allTweets.slice(0, PAGE_SIZE);
        container.innerHTML = initialTweets.map(renderTweet).join('');
        displayedCount = initialTweets.length;
        
        const btn = document.getElementById('load-more-btn');
        const hasMore = allTweets.length > PAGE_SIZE || availableMonths.length > 1;
        btn.textContent = hasMore ? '加载更多' : '已加载全部';
        if (!hasMore) btn.disabled = true;
        
      } catch (err) {
        console.error('初始化失败:', err);
        document.getElementById('tweets-list').innerHTML = '<div class="empty">加载失败，请刷新重试</div>';
        document.getElementById('load-more-btn').style.display = 'none';
      }
    }

    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentFilter = tab.getAttribute('data-filter');
        applyFilter(currentFilter);
      });
    });

    const originalSetLang = window.setLang || function() {};
    window.setLang = function(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      if (originalSetLang) originalSetLang(lang);
      location.reload();
    };

    init();
  </script>
</body>
</html>
