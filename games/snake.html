    <div class="game-container">

        <button class="btn-game" onclick="startGame()">开始游戏</button>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const highScoreEl = document.getElementById('high-score');
    const finalScoreEl = document.getElementById('final-score');
    const gameOverEl = document.getElementById('gameOver');
    const difficultySelect = document.getElementById('difficulty');

    const GRID_SIZE = 20;
    const TILE_COUNT = canvas.width / GRID_SIZE;

    let snake = [];
    let food = {};
    let direction = { x: 0, y: 0 };
    let nextDirection = { x: 0, y: 0 };
    let score = 0;
    let highScore = localStorage.getItem('snake-high-score') || 0;
    let gameRunning = false;
    let gamePaused = false;
    let gameLoop = null;

    highScoreEl.textContent = highScore;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      scoreEl.textContent = score;
      gameOverEl.style.display = 'none';
      placeFood();
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * TILE_COUNT),
          y: Math.floor(Math.random() * TILE_COUNT)
        };
      } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
    }

    function draw() {
      // 清空画布
      ctx.fillStyle = '#f8fafc';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 绘制网格
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 0.5;
      for (let i = 0; i <= TILE_COUNT; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID_SIZE, 0);
        ctx.lineTo(i * GRID_SIZE, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * GRID_SIZE);
        ctx.lineTo(canvas.width, i * GRID_SIZE);
        ctx.stroke();
      }

      // 绘制食物
      ctx.fillStyle = '#e94560';
      ctx.shadowColor = '#e94560';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(
        food.x * GRID_SIZE + GRID_SIZE / 2,
        food.y * GRID_SIZE + GRID_SIZE / 2,
        GRID_SIZE / 2 - 2,
        0,
        Math.PI * 2
      );
      ctx.fill();
      ctx.shadowBlur = 0;

      // 绘制蛇
      snake.forEach((segment, index) => {
        if (index === 0) {
          // 蛇头
          ctx.fillStyle = '#6366f1';
          ctx.strokeStyle = '#4f46e5';
          ctx.lineWidth = 2;
        } else {
          // 蛇身
          ctx.fillStyle = '#818cf8';
          ctx.strokeStyle = '#6366f1';
          ctx.lineWidth = 1;
        }

        ctx.fillRect(
          segment.x * GRID_SIZE + 1,
          segment.y * GRID_SIZE + 1,
          GRID_SIZE - 2,
          GRID_SIZE - 2
        );
        ctx.strokeRect(
          segment.x * GRID_SIZE + 1,
          segment.y * GRID_SIZE + 1,
          GRID_SIZE - 2,
          GRID_SIZE - 2
        );

        // 蛇眼
        if (index === 0) {
          ctx.fillStyle = '#fff';
          const eyeSize = 3;
          const eyeOffset = 5;
          if (direction.x === 1) { // 向右
            ctx.fillRect(segment.x * GRID_SIZE + 12, segment.y * GRID_SIZE + 5, eyeSize, eyeSize);
            ctx.fillRect(segment.x * GRID_SIZE + 12, segment.y * GRID_SIZE + 12, eyeSize, eyeSize);
          } else if (direction.x === -1) { // 向左
            ctx.fillRect(segment.x * GRID_SIZE + 5, segment.y * GRID_SIZE + 5, eyeSize, eyeSize);
            ctx.fillRect(segment.x * GRID_SIZE + 5, segment.y * GRID_SIZE + 12, eyeSize, eyeSize);
          } else if (direction.y === -1) { // 向上
            ctx.fillRect(segment.x * GRID_SIZE + 5, segment.y * GRID_SIZE + 5, eyeSize, eyeSize);
            ctx.fillRect(segment.x * GRID_SIZE + 12, segment.y * GRID_SIZE + 5, eyeSize, eyeSize);
          } else { // 向下
            ctx.fillRect(segment.x * GRID_SIZE + 5, segment.y * GRID_SIZE + 12, eyeSize, eyeSize);
            ctx.fillRect(segment.x * GRID_SIZE + 12, segment.y * GRID_SIZE + 12, eyeSize, eyeSize);
          }
        }
      });
    }

    function update() {
      if (gamePaused) return;

      direction = { ...nextDirection };

      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

      // 撞墙检测
      if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
        gameOver();
        return;
      }

      // 撞自己检测
      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      // 吃食物检测
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = score;
        if (score > highScore) {
          highScore = score;
          highScoreEl.textContent = highScore;
          localStorage.setItem('snake-high-score', highScore);
        }
        placeFood();
      } else {
        snake.pop();
      }
    }

    function gameOver() {
      gameRunning = false;
      clearInterval(gameLoop);
      finalScoreEl.textContent = score;
      gameOverEl.style.display = 'block';
    }

    function startGame() {
      if (gameRunning) {
        clearInterval(gameLoop);
      }
      initGame();
      gameRunning = true;
      gamePaused = false;
      const speed = parseInt(difficultySelect.value);
      gameLoop = setInterval(() => {
        update();
        draw();
      }, speed);
    }

    function pauseGame() {
      if (!gameRunning) return;
      gamePaused = !gamePaused;
      if (gamePaused) {
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#1e293b';
        ctx.font = '24px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('已暂停', canvas.width / 2, canvas.height / 2);
        ctx.font = '16px Arial';
        ctx.fillText('按空格键继续', canvas.width / 2, canvas.height / 2 + 30);
      }
    }

    // 键盘控制
    document.addEventListener('keydown', (e) => {
      if (!gameRunning && e.key === 'Enter') {
        startGame();
        return;
      }

      if (e.key === ' ') {
        e.preventDefault();
        pauseGame();
        return;
      }

      if (!gameRunning || gamePaused) return;

      switch (e.key) {
        case 'ArrowUp':
          e.preventDefault();
          if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
          break;
        case 'ArrowDown':
          e.preventDefault();
          if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
          break;
        case 'ArrowLeft':
          e.preventDefault();
          if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
          break;
        case 'ArrowRight':
          e.preventDefault();
          if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
          break;
      }
    });

    // 触摸控制（移动端）
    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });

    canvas.addEventListener('touchend', (e) => {
      if (!gameRunning || gamePaused) return;
      
      const touchEndX = e.changedTouches[0].clientX;
      const touchEndY = e.changedTouches[0].clientY;
      
      const dx = touchEndX - touchStartX;
      const dy = touchEndY - touchStartY;
      
      if (Math.abs(dx) > Math.abs(dy)) {
        // 水平滑动
        if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
        else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
      } else {
        // 垂直滑动
        if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
        else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
      }
    });

    // 初始绘制
    initGame();
    draw();
  </script>
